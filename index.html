<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCI-Linker: 정밀 이송 관리</title>
    <style>
        :root { --red: #ff4d4d; --yellow: #ffcc00; --green: #2ecc71; --black: #2c3e50; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; margin: 15px; background: #f0f2f5; font-size: 14px; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 섹션 구분 */
        .section-title { background: #34495e; color: white; padding: 8px 12px; border-radius: 4px; margin: 15px 0 10px 0; font-size: 0.9rem; }
        
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .full-width { grid-column: span 2; }
        
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        /* iOS: 입력 포커스 시 자동 확대 방지(16px 미만이면 줌) */
        input, select, textarea { font-size: 16px; }
        label { font-weight: bold; font-size: 0.8rem; display: block; margin-bottom: 3px; color: #555; }

        .time-row { display: flex; gap: 6px; align-items: stretch; }
        .time-row input[type="time"] { flex: 1; min-width: 0; }
        .time-row .btn-now { width: auto; min-width: 52px; flex-shrink: 0; min-height: 44px; padding: 0 8px; font-size: 13px; }

        /* 중증도 버튼 */
        .triage-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .triage-btn { border: none; cursor: pointer; min-height: 44px; height: 45px; font-weight: bold; color: white; border-radius: 8px; opacity: 0.4; }
        .triage-btn.active { opacity: 1; outline: 3px solid #000; }
        .red { background: var(--red); } .yellow { background: var(--yellow); color: #000; } 
        .green { background: var(--green); } .black { background: var(--black); }

        /* 테이블 스타일 */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 12px; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        .status-badge { padding: 3px 6px; border-radius: 3px; font-weight: bold; color: white; display: inline-block; }

        .view.hidden { display: none !important; }

        /* 첫 화면 — 사건 분류 */
        .landing-hint { font-size: 0.85rem; color: #666; margin: 0 0 16px; line-height: 1.45; }
        .landing-card {
            border: 1px solid #dde1e6;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
            background: #fafbfc;
        }
        .landing-title-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 14px;
            min-height: 52px;
            border: none;
            background: #34495e;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
        }
        .landing-title-btn:hover { filter: brightness(1.06); }
        .landing-title-btn .chev { font-size: 1.35rem; opacity: 0.9; font-weight: normal; }
        .landing-card-body { padding: 12px 14px 14px; background: #fff; }
        .landing-card-body textarea { width: 100%; box-sizing: border-box; min-height: 88px; resize: vertical; }
        .landing-card { cursor: pointer; }
        .landing-card :is(input, textarea, select, label, .btn-now) { cursor: auto; }
        .landing-primary-cta {
            width: 100%;
            margin-top: 8px;
            padding: 16px 18px;
            min-height: 54px;
            border: none;
            border-radius: 10px;
            background: #2980b9;
            color: #fff;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(41, 128, 185, 0.35);
        }
        .landing-primary-cta:hover { filter: brightness(1.06); }
        .landing-status { font-size: 0.85rem; min-height: 1.3em; margin: 0 0 12px; color: #555; }

        .incident-tabs {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0 14px;
            margin: 0 0 4px;
            -webkit-overflow-scrolling: touch;
            border-bottom: 2px solid #dee2e6;
        }
        .record-incident-tabs { margin-bottom: 10px; border-bottom-color: #bdc3c7; }
        .incident-tabs-empty {
            font-size: 0.85rem;
            color: #888;
            padding: 8px 4px;
            white-space: normal;
        }
        .incident-tab {
            flex: 0 0 auto;
            max-width: 200px;
            padding: 10px 14px;
            border-radius: 8px 8px 0 0;
            border: 1px solid #bdc3c7;
            border-bottom: none;
            background: #e9ecef;
            color: #2c3e50;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .incident-tab:hover { background: #dee2e6; }
        .incident-tab.active {
            background: #2980b9;
            color: #fff;
            border-color: #2980b9;
        }

        /* 이송 기록 화면 — 상단 사건 맥락 */
        .record-context-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding: 10px 12px;
            background: #ecf0f1;
            border-radius: 8px;
            border: 1px solid #dde4e8;
        }
        .btn-back {
            flex-shrink: 0;
            width: auto;
            padding: 8px 14px;
            background: #7f8c8d;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-back:hover { filter: brightness(1.05); }
        .record-context-text { flex: 1; min-width: 0; font-size: 0.85rem; color: #2c3e50; line-height: 1.4; word-break: break-word; }

        @media (max-width: 480px) {
            body { margin: 10px; font-size: 14px; }
            .container { padding: 14px; border-radius: 10px; }
            .input-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .triage-group { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .triage-btn { height: auto; min-height: 48px; font-size: 15px; }
            /* 테이블은 가로 스크롤 유지(800px) — 열 너비·가독성 우선 */
            th, td { font-size: 11px; padding: 6px; }
        }
    </style>
</head>
<body>

<!-- 1) 사건 분류 — 사건 생성 후 탭으로 이송 기록 화면 진입 -->
<div id="view-landing" class="view container">
    <h3 style="text-align:center; margin-top:0;">MCI-Linker · 사건 분류</h3>
    <p class="landing-hint"><strong>사건 생성</strong>을 누르면 아래에 <strong>탭</strong>이 생깁니다. 탭을 누르면 그 사건의 <strong>다수사상자 이송 현황 기록</strong>으로 들어갑니다.</p>

    <div id="incidentTabs" class="incident-tabs" role="tablist" aria-label="등록된 사건"></div>
    <p id="landingIncidentStatus" class="landing-status" aria-live="polite"></p>

    <div class="section-title">새 사건</div>
    <div class="input-grid">
        <div>
            <label for="incidentDate">사건 일자</label>
            <input type="date" id="incidentDate">
        </div>
        <div>
            <label for="incidentTime">기준 시각</label>
            <div class="time-row">
                <input type="time" id="incidentTime">
                <button type="button" class="btn-now" id="btnIncidentTimeNow">현재</button>
            </div>
        </div>
        <div class="full-width">
            <label for="incidentSummary">사건요약 (현장·환자군 등)</label>
            <textarea id="incidentSummary" rows="3" placeholder="예: OO역 인근 다수사상, 구급대 현장 지휘" style="width:100%; box-sizing:border-box;"></textarea>
        </div>
    </div>
    <button type="button" id="btnCreateIncident" class="landing-primary-cta">사건 생성</button>
</div>

<!-- 2) 다수사상자 이송 현황 기록 -->
<div id="view-record" class="view container hidden">
    <div id="recordIncidentTabs" class="incident-tabs record-incident-tabs" role="tablist" aria-label="사건 전환"></div>
    <div class="record-context-bar">
        <button type="button" class="btn-back" id="btnBackLanding">← 사건 분류</button>
        <div id="recordContextText" class="record-context-text"></div>
    </div>
    <h3 style="text-align:center; margin-top:0;">🚑 다수사상자 이송 현황 기록</h3>
    
    <div class="section-title">1. 사상자 및 발견 정보</div>
    <div class="input-grid">
        <div><label>성명(국적)</label><input type="text" id="name" placeholder="홍길동"></div>
        <div><label>성별(연령)</label><input type="text" id="ageInfo" placeholder="M(36)"></div>
        <div class="full-width"><label>발견 장소</label><input type="text" id="loc" placeholder="사고현장 본관 1층"></div>
    </div>

    <div class="section-title">2. 인계 및 중증도 분류 </div>
    <div class="input-grid">
        <div><label>인계자 (진압/구조대)</label><input type="text" id="provider" placeholder="구조1대 김소방"></div>
        <div>
            <label>인계(구조)시각</label>
            <div class="time-row">
                <input type="time" id="provideTime">
                <button type="button" class="btn-now" data-time-target="provideTime">현재</button>
            </div>
        </div>
        <div class="full-width">
            <label>중증도 분류</label>
            <div class="triage-group">
                <button type="button" class="triage-btn red" data-triage="긴급">긴급</button>
                <button type="button" class="triage-btn yellow" data-triage="응급">응급</button>
                <button type="button" class="triage-btn green" data-triage="비응급">비응급</button>
                <button type="button" class="triage-btn black" data-triage="사망">사망</button>
            </div>
        </div>
        <div class="full-width"><label>주증상 (손상원인)</label><input type="text" id="symptom" placeholder="의식저하, 다발성 골절"></div>
    </div>

    <div class="section-title">3. 이송 상태 </div>
    <div class="input-grid">
        <div>
            <label>이송 여부</label>
            <select id="transferStatus">
                <option value="이송">이송</option>
                <option value="미이송">미이송</option>
            </select>
        </div>
        <div>
            <label>출발 시각</label>
            <div class="time-row">
                <input type="time" id="startTime">
                <button type="button" class="btn-now" data-time-target="startTime">현재</button>
            </div>
        </div>
        <div class="full-width"><label>이송 병원</label><input type="text" id="hospital" placeholder="강서성심병원"></div>
    </div>

    <p id="dbStatus" style="margin:12px 0 0; font-size:13px; color:#555; min-height:1.2em;" aria-live="polite"></p>
    <button type="button" id="btnSave" style="margin-top:8px; background:#2980b9; color:white; height:50px; font-size:18px; cursor:pointer;">데이터 저장 및 리스트 추가</button>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>No</th>
                    <th>성명</th>
                    <th>인계자(시각)</th>
                    <th>중증도</th>
                    <th>이송여부</th>
                    <th>출발시각</th>
                    <th>이송병원</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<!-- /view-record -->

<script type="module" src="/src/main.js"></script>

</body>
</html>
