<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다수사상자 (이송)현황</title>
    <style>
        :root { --red: #ff4d4d; --yellow: #ffcc00; --green: #2ecc71; --black: #2c3e50; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; margin: 15px; background: #f0f2f5; font-size: 14px; line-height: 1.45; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* 페이지 상단 제목 — 본문(14px)보다 확실히 크게 */
        .page-title {
            text-align: center;
            margin: 0 0 10px;
            font-size: clamp(1.45rem, 4.5vw, 1.95rem);
            font-weight: 800;
            line-height: 1.2;
            color: #152028;
            letter-spacing: -0.03em;
        }
        
        /* 섹션 구분 */
        .section-title { background: #34495e; color: white; padding: 10px 14px; border-radius: 4px; margin: 18px 0 10px 0; font-size: 1.08rem; font-weight: 700; }
        
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .full-width { grid-column: span 2; }
        /* 성명·연령·성별 — 가로 폭 좁게 */
        .record-id-row {
            grid-template-columns: minmax(0, 0.95fr) minmax(0, 0.55fr) minmax(0, 1.15fr);
            align-items: end;
        }
        .record-id-row .col-sex .sex-group { margin-bottom: 0; }
        
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        /* iOS: 입력 포커스 시 자동 확대 방지(16px 미만이면 줌) */
        input, select, textarea { font-size: 16px; }
        label { font-weight: bold; font-size: 0.8rem; display: block; margin-bottom: 3px; color: #555; }

        .time-row { display: flex; gap: 6px; align-items: stretch; }
        .time-row input[type="time"] { flex: 1; min-width: 0; }
        .time-row .btn-now { width: auto; min-width: 52px; flex-shrink: 0; min-height: 44px; padding: 0 8px; font-size: 13px; }

        /* 중증도 버튼 */
        .triage-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .triage-btn { border: none; cursor: pointer; min-height: 44px; height: 45px; font-weight: bold; color: white; border-radius: 8px; opacity: 0.4; }
        .triage-btn.active { opacity: 1; outline: 3px solid #000; }
        .red { background: var(--red); } .yellow { background: var(--yellow); color: #000; } 
        .green { background: var(--green); } .black { background: var(--black); }

        .sex-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
        .sex-tab {
            border: 2px solid #bdc3c7;
            cursor: pointer;
            min-height: 46px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 8px;
            background: #ecf0f1;
            color: #2c3e50;
            opacity: 0.55;
            font-family: inherit;
        }
        .sex-tab.active { opacity: 1; outline: 2px solid #2c3e50; }
        .sex-tab.sex-m.active { background: #3498db; border-color: #2980b9; color: #fff; }
        .sex-tab.sex-f.active { background: #9b59b6; border-color: #8e44ad; color: #fff; }

        /* 테이블 — 세로 스크롤 위주, 셀 줄바꿈으로 가로 스크롤 최소화 */
        .record-output-section {
            scroll-margin-top: 16px;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid #dee2e6;
        }
        .record-list-heading { margin-top: 0; }
        .record-list-head {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .record-list-head .record-list-heading {
            flex: 1 1 220px;
            margin: 0;
        }
        .btn-export-xlsx {
            width: auto;
            flex-shrink: 0;
            padding: 10px 18px;
            min-height: 44px;
            background: #1e8449;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(30, 132, 73, 0.35);
        }
        .btn-export-xlsx:hover { filter: brightness(1.06); }
        .table-container {
            overflow-x: auto;
            margin-top: 8px;
            max-height: min(55vh, 520px);
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 0;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 6px 5px;
            text-align: center;
            font-size: 11px;
            vertical-align: middle;
            word-break: break-word;
            overflow-wrap: anywhere;
            hyphens: auto;
        }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 1; box-shadow: 0 1px 0 #ddd; }
        th:nth-child(1), td:nth-child(1) { width: 28px; }
        th:nth-child(2), td:nth-child(2) { width: 9%; }
        th:nth-child(3), td:nth-child(3) { width: 6%; }
        th:nth-child(4), td:nth-child(4) { width: 6%; }
        th:nth-child(5), td:nth-child(5) { width: 14%; }
        th:nth-child(6), td:nth-child(6) { width: 11%; }
        th:nth-child(7), td:nth-child(7) { width: 8%; }
        th:nth-child(8), td:nth-child(8) { width: 11%; }
        th:nth-child(9), td:nth-child(9) { width: 10%; }
        th:nth-child(10), td:nth-child(10) { width: auto; }
        .status-badge { padding: 3px 6px; border-radius: 3px; font-weight: bold; color: white; display: inline-block; }

        /* 데스크톱만 표 / 모바일만 카드 */
        .entry-cards { display: none; }
        .entry-card {
            border: 1px solid #cfd8dc;
            border-radius: 10px;
            padding: 12px 14px;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            text-align: left;
        }
        .entry-card-line1 {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 10px;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.45;
            color: #1a237e;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 2px solid #e3f2fd;
        }
        .entry-card-line2 {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 0;
            font-size: 14px;
            line-height: 1.55;
            color: #263238;
        }
        .entry-card-line2 .ec-seg {
            display: inline;
        }
        .entry-card-line2 .ec-sep { color: #90a4ae; margin: 0 6px; font-weight: normal; }
        tr.data-row-clickable { cursor: pointer; }
        tr.data-row-clickable:hover { background: #f0f7ff !important; }
        .entry-card.data-row-clickable { cursor: pointer; }
        .entry-card.data-row-clickable:active { filter: brightness(0.97); }

        .edit-modal.hidden { display: none !important; }
        .edit-modal {
            position: fixed;
            inset: 0;
            z-index: 400;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            box-sizing: border-box;
        }
        .edit-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }
        .edit-modal-sheet {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            max-height: calc(100vh - 20px);
            overflow-y: auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.22);
            margin-top: max(8px, env(safe-area-inset-top));
            -webkit-overflow-scrolling: touch;
        }
        .edit-modal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 2px solid #2980b9;
            position: sticky;
            top: 0;
            background: linear-gradient(#fff, #f8fbfd);
            z-index: 2;
        }
        .edit-modal-toolbar strong { font-size: 1.05rem; color: #1a252f; }
        .btn-cancel-edit {
            width: auto;
            flex-shrink: 0;
            padding: 8px 16px;
            min-height: 40px;
            background: #7f8c8d;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-cancel-edit:hover { filter: brightness(1.05); }
        .edit-modal-form-host { padding: 8px 14px 20px; }

        .ec-no {
            flex-shrink: 0;
            min-width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #2980b9;
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 800;
        }
        .ec-loc, .ec-symptom { font-weight: 500; color: #37474f; }

        .view.hidden { display: none !important; }

        /* 첫 화면 — 사건 분류 */
        .landing-hint { font-size: 0.85rem; color: #666; margin: 0 0 16px; line-height: 1.45; }
        .landing-card {
            border: 1px solid #dde1e6;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
            background: #fafbfc;
        }
        .landing-title-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 14px;
            min-height: 52px;
            border: none;
            background: #34495e;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
        }
        .landing-title-btn:hover { filter: brightness(1.06); }
        .landing-title-btn .chev { font-size: 1.35rem; opacity: 0.9; font-weight: normal; }
        .landing-card-body { padding: 12px 14px 14px; background: #fff; }
        .landing-card-body textarea { width: 100%; box-sizing: border-box; min-height: 88px; resize: vertical; }
        .landing-card { cursor: pointer; }
        .landing-card :is(input, textarea, select, label, .btn-now) { cursor: auto; }
        .landing-primary-cta {
            width: 100%;
            margin-top: 8px;
            padding: 16px 18px;
            min-height: 54px;
            border: none;
            border-radius: 10px;
            background: #2980b9;
            color: #fff;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(41, 128, 185, 0.35);
        }
        .landing-primary-cta:hover { filter: brightness(1.06); }
        .landing-status { font-size: 0.85rem; min-height: 1.3em; margin: 0 0 12px; color: #555; }

        .incident-tabs {
            display: flex;
            flex-wrap: nowrap;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0 14px;
            margin: 0 0 4px;
            -webkit-overflow-scrolling: touch;
            border-bottom: 2px solid #dee2e6;
        }
        .record-incident-tabs { margin-bottom: 10px; border-bottom-color: #bdc3c7; }
        .incident-tabs-empty {
            font-size: 0.85rem;
            color: #888;
            padding: 8px 4px;
            white-space: normal;
        }
        .incident-tab {
            flex: 0 0 auto;
            max-width: 200px;
            padding: 10px 14px;
            border-radius: 8px 8px 0 0;
            border: 1px solid #bdc3c7;
            border-bottom: none;
            background: #e9ecef;
            color: #2c3e50;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .incident-tab:hover { background: #dee2e6; }
        .incident-tab.active {
            background: #2980b9;
            color: #fff;
            border-color: #2980b9;
        }

        .landing-delete-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #e9ecef;
        }
        .landing-delete-select {
            max-width: min(240px, 58vw);
            font-size: 12px;
            padding: 5px 8px;
            width: auto;
            flex: 1 1 auto;
            min-width: 0;
            border-radius: 4px;
        }
        .landing-delete-btn {
            width: auto;
            flex-shrink: 0;
            font-size: 12px;
            padding: 5px 12px;
            min-height: 32px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .landing-delete-btn:hover { filter: brightness(1.05); }
        .landing-delete-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: none;
        }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* 이송 기록 화면 — 상단 사건 맥락 */
        .record-context-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding: 10px 12px;
            background: #ecf0f1;
            border-radius: 8px;
            border: 1px solid #dde4e8;
        }
        .btn-back {
            flex-shrink: 0;
            width: auto;
            padding: 8px 14px;
            background: #7f8c8d;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-back:hover { filter: brightness(1.05); }
        .record-context-text { flex: 1; min-width: 0; font-size: 0.85rem; color: #2c3e50; line-height: 1.4; word-break: break-word; }

        @media (max-width: 480px) {
            body { margin: 10px; font-size: 14px; }
            .page-title { font-size: clamp(1.35rem, 5.5vw, 1.65rem); margin-bottom: 8px; }
            .section-title { font-size: 1rem; padding: 9px 12px; }
            .container { padding: 14px; border-radius: 10px; }
            .input-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .record-id-row { grid-template-columns: 1fr; }
            .triage-group { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .triage-btn { height: auto; min-height: 48px; font-size: 15px; }
            th, td { font-size: 10px; padding: 5px 4px; }
            .table-container.desktop-table-wrap { display: none !important; }
            .entry-cards {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-top: 8px;
                max-height: min(62vh, 560px);
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 8px;
            }
            .entry-card-line1 { font-size: 16px; }
            .entry-card-line2 { font-size: 15px; }
        }
    </style>
</head>
<body>

<!-- 1) 사건 분류 — 사건 생성 후 탭으로 이송 기록 화면 진입 -->
<div id="view-landing" class="view container">
    <h1 class="page-title">세이브보드 (SaveBoard)</h1>
    <p class="landing-hint"><strong>사건 생성</strong>을 누르면 아래에 <strong>탭</strong>이 생깁니다. 탭을 누르면 그 사건의 <strong>다수사상자 (이송)현황</strong> 기록 화면으로 들어갑니다.</p>

    <div id="incidentTabs" class="incident-tabs" role="tablist" aria-label="등록된 사건"></div>
    <p id="landingIncidentStatus" class="landing-status" aria-live="polite"></p>

    <div class="section-title">새 사건</div>
    <div class="input-grid">
        <div>
            <label for="incidentDate">사건 일자</label>
            <input type="date" id="incidentDate">
        </div>
        <div>
            <label for="incidentTime">기준 시각</label>
            <div class="time-row">
                <input type="time" id="incidentTime">
                <button type="button" class="btn-now" id="btnIncidentTimeNow">현재</button>
            </div>
        </div>
        <div class="full-width">
            <label for="incidentSummary">사건요약 (현장·환자군 등)</label>
            <textarea id="incidentSummary" rows="3" placeholder="예: OO역 인근 다수사상, 구급대 현장 지휘" style="width:100%; box-sizing:border-box;"></textarea>
        </div>
    </div>
    <button type="button" id="btnCreateIncident" class="landing-primary-cta">사건 생성</button>

    <div class="landing-delete-bar">
        <label for="incidentDeleteSelect" class="visually-hidden">삭제할 사건</label>
        <select id="incidentDeleteSelect" class="landing-delete-select" aria-label="삭제할 사건 선택"></select>
        <button type="button" id="btnDeleteIncident" class="landing-delete-btn">삭제</button>
    </div>
</div>

<!-- 2) 다수사상자 (이송)현황 기록 -->
<div id="view-record" class="view container hidden">
    <div id="recordIncidentTabs" class="incident-tabs record-incident-tabs" role="tablist" aria-label="사건 전환"></div>
    <div class="record-context-bar">
        <button type="button" class="btn-back" id="btnBackLanding">← 세이브보드</button>
        <div id="recordContextText" class="record-context-text"></div>
    </div>
    <h1 class="page-title">🚑 다수사상자 (이송)현황</h1>

    <div id="editModal" class="edit-modal hidden" role="dialog" aria-modal="true" aria-labelledby="editModalTitleText">
        <div class="edit-modal-backdrop" id="editModalBackdrop" aria-hidden="true"></div>
        <div class="edit-modal-sheet">
            <div class="edit-modal-toolbar">
                <strong id="editModalTitleText">데이터 수정</strong>
                <button type="button" class="btn-cancel-edit" id="btnCancelEdit">닫기</button>
            </div>
            <div id="editModalFormHost" class="edit-modal-form-host"></div>
        </div>
    </div>

    <div id="recordFormBlock">
    <div class="section-title">1. 사상자 및 발견 정보</div>
    <div class="input-grid record-id-row">
        <div class="col-narrow"><label>성명(국적)</label><input type="text" id="name" placeholder="홍길동"></div>
        <div class="col-narrow"><label>연령</label><input type="text" id="ageInfo" inputmode="numeric" placeholder="예: 36" autocomplete="off"></div>
        <div class="col-sex">
            <label>성별</label>
            <div class="sex-group" role="group" aria-label="성별 선택">
                <button type="button" class="sex-tab sex-m" data-sex="남성">남성</button>
                <button type="button" class="sex-tab sex-f" data-sex="여성">여성</button>
            </div>
        </div>
        <div class="full-width"><label>발견지점</label><input type="text" id="loc" placeholder="사고현장 본관 1층"></div>
    </div>

    <div class="section-title">2. 인계 및 중증도 분류 </div>
    <div class="input-grid">
        <div><label>인계자 (진압/구조대)</label><input type="text" id="provider" placeholder="구조1대 김소방"></div>
        <div>
            <label>인계(구조)시각</label>
            <div class="time-row">
                <input type="time" id="provideTime">
                <button type="button" class="btn-now" data-time-target="provideTime">현재</button>
            </div>
        </div>
        <div class="full-width">
            <label>중증도 분류</label>
            <div class="triage-group">
                <button type="button" class="triage-btn red" data-triage="긴급">긴급</button>
                <button type="button" class="triage-btn yellow" data-triage="응급">응급</button>
                <button type="button" class="triage-btn green" data-triage="비응급">비응급</button>
                <button type="button" class="triage-btn black" data-triage="사망">사망</button>
            </div>
        </div>
        <div class="full-width"><label>🩼 주증상 (손상원인)</label><input type="text" id="symptom" placeholder="의식저하, 다발성 골절"></div>
    </div>

    <div class="section-title">3. 이송 상태 </div>
    <div class="input-grid">
        <div>
            <label>이송 여부</label>
            <select id="transferStatus">
                <option value="이송">이송</option>
                <option value="미이송">미이송</option>
            </select>
        </div>
        <div>
            <label>출발 시각</label>
            <div class="time-row">
                <input type="time" id="startTime">
                <button type="button" class="btn-now" data-time-target="startTime">현재</button>
            </div>
        </div>
